<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            /* A beautiful, modern dark gradient background for presentation */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: white; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .lyrics {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: bold;
            text-align: center;
            font-size: {{FontSize}};
            text-shadow: 3px 3px 8px rgba(0,0,0,0.9);
            line-height: 1.6;
            max-width: 90%;
        }
    </style>
</head>
<body>
    <div class="lyrics">
        {{Lyrics}}
    </div>
</body>
</html>
